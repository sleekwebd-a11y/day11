<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MacroCalc • Free Macro Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950 text-slate-200 font-sans">
  <div class="max-w-md mx-auto px-4 py-10 space-y-6">

    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="w-16 h-16 mx-auto bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl shadow-2xl flex items-center justify-center text-3xl">🔥</div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">MacroCalc</h1>
      <p class="text-slate-400 text-sm">Your daily calories & macros in seconds</p>
    </div>

    <!-- Form card -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl space-y-4">
      <h2 class="text-lg font-bold">Tell us about yourself</h2>

      <!-- Sex -->
      <div>
        <label class="block text-sm text-slate-400 mb-2">Biological sex</label>
        <div class="flex gap-3">
          <button id="btnMale" onclick="setSex('male')" class="flex-1 py-3 rounded-2xl border border-white/20 bg-white/10 font-semibold transition-all">♂ Male</button>
          <button id="btnFemale" onclick="setSex('female')" class="flex-1 py-3 rounded-2xl border border-white/20 bg-white/5 font-semibold transition-all">♀ Female</button>
        </div>
      </div>

      <!-- Age / Weight / Height -->
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Age</label>
          <input id="age" type="number" placeholder="25" class="w-full p-3 bg-white/5 border border-white/20 rounded-2xl text-white placeholder-slate-500 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Weight (kg)</label>
          <input id="weight" type="number" placeholder="75" class="w-full p-3 bg-white/5 border border-white/20 rounded-2xl text-white placeholder-slate-500 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Height (cm)</label>
          <input id="height" type="number" placeholder="175" class="w-full p-3 bg-white/5 border border-white/20 rounded-2xl text-white placeholder-slate-500 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>
      </div>

      <!-- Activity -->
      <div>
        <label class="block text-sm text-slate-400 mb-2">Activity level</label>
        <select id="activity" class="w-full p-3 bg-slate-800 border border-white/20 rounded-2xl text-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          <option value="1.2">Sedentary (desk job, no exercise)</option>
          <option value="1.375">Light (1-3x/week)</option>
          <option value="1.55" selected>Moderate (3-5x/week)</option>
          <option value="1.725">Active (6-7x/week)</option>
          <option value="1.9">Very active (athlete / physical job)</option>
        </select>
      </div>

      <!-- Goal -->
      <div>
        <label class="block text-sm text-slate-400 mb-2">Goal</label>
        <div class="grid grid-cols-3 gap-3">
          <button id="btnCut" onclick="setGoal('cut')" class="py-3 rounded-2xl border border-white/20 bg-white/5 text-sm font-semibold transition-all">✂️ Cut</button>
          <button id="btnMaintain" onclick="setGoal('maintain')" class="py-3 rounded-2xl border border-white/20 bg-white/10 text-sm font-semibold transition-all ring-2 ring-emerald-500">⚖️ Maintain</button>
          <button id="btnBulk" onclick="setGoal('bulk')" class="py-3 rounded-2xl border border-white/20 bg-white/5 text-sm font-semibold transition-all">💪 Bulk</button>
        </div>
      </div>

      <button onclick="calculate()" class="w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 rounded-2xl font-bold text-lg shadow-2xl transition-all">
        Calculate my macros →
      </button>
    </div>

    <!-- Results card (hidden until calc) -->
    <div id="resultsCard" class="hidden bg-gradient-to-br from-emerald-900/40 to-teal-900/40 backdrop-blur-xl border border-emerald-500/30 rounded-3xl p-6 shadow-2xl space-y-5">
      <h2 class="text-xl font-bold text-emerald-300">Your daily targets 🎯</h2>

      <!-- Calories big number -->
      <div class="text-center py-4 bg-white/5 rounded-2xl">
        <div id="calDisplay" class="text-5xl font-black text-white"></div>
        <div class="text-slate-400 text-sm mt-1">calories / day</div>
      </div>

      <!-- Macros bars -->
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span class="font-semibold text-blue-300">🥩 Protein</span>
            <span id="proteinG" class="font-bold"></span>
          </div>
          <div class="h-3 bg-white/10 rounded-full overflow-hidden">
            <div id="proteinBar" class="h-full bg-blue-500 rounded-full transition-all duration-700"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span class="font-semibold text-yellow-300">🍚 Carbs</span>
            <span id="carbsG" class="font-bold"></span>
          </div>
          <div class="h-3 bg-white/10 rounded-full overflow-hidden">
            <div id="carbsBar" class="h-full bg-yellow-500 rounded-full transition-all duration-700"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span class="font-semibold text-orange-300">🥑 Fat</span>
            <span id="fatG" class="font-bold"></span>
          </div>
          <div class="h-3 bg-white/10 rounded-full overflow-hidden">
            <div id="fatBar" class="h-full bg-orange-500 rounded-full transition-all duration-700"></div>
          </div>
        </div>
      </div>

      <!-- BMR / TDEE info -->
      <div class="grid grid-cols-2 gap-3 text-center">
        <div class="bg-white/5 rounded-2xl p-3">
          <div id="bmrDisplay" class="text-xl font-bold text-slate-200"></div>
          <div class="text-xs text-slate-400 mt-1">BMR (base)</div>
        </div>
        <div class="bg-white/5 rounded-2xl p-3">
          <div id="tdeeDisplay" class="text-xl font-bold text-slate-200"></div>
          <div class="text-xs text-slate-400 mt-1">TDEE (maintenance)</div>
        </div>
      </div>

      <!-- Tip -->
      <div id="goalTip" class="text-sm text-slate-300 bg-white/5 rounded-2xl p-4"></div>

      <!-- Share -->
      <button onclick="share()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 rounded-2xl font-bold shadow-2xl transition-all">
        🔗 Share my macros
      </button>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
